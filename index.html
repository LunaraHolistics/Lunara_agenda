<!doctype html>
<html lang="en">
  <head>
    <script>
      // Desativar APIs experimentais que causam erros de Origin Trial
      window.ai = {
        writer: { capabilities: () => Promise.resolve({ available: 'no' }) },
        rewriter: { capabilities: () => Promise.resolve({ available: 'no' }) },
        languageModel: { capabilities: () => Promise.resolve({ available: 'no' }) }
      };
      // Silenciar erro de Permissions-Policy
      document.currentScript.parentElement.insertAdjacentHTML('afterbegin', '<meta http-equiv=\"Permissions-Policy\" content=\"language-detector=(), proofreader=()\">');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Lunara Agenda</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
